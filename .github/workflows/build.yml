name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract OCR
        run: choco install tesseract -y

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build main tool EXE (bundles Tesseract)
        shell: pwsh
        run: |
          pyinstaller --onefile --noconsole --name MedvisionSync `
            --collect-all cv2 `
            --add-binary "C:\Program Files\Tesseract-OCR\tesseract.exe;tesseract" `
            --add-data "C:\Program Files\Tesseract-OCR\tessdata;tesseract\tessdata" `
            gui.py

      - name: Build diagnostic EXE
        run: |
          pyinstaller --onefile --name Diagnose --collect-all cv2 diagnose.py

      - name: Build detection self-test EXE (bundles Tesseract)
        shell: pwsh
        run: |
          pyinstaller --onefile --name TestDetection `
            --collect-all cv2 `
            --add-binary "C:\Program Files\Tesseract-OCR\tesseract.exe;tesseract" `
            --add-data "C:\Program Files\Tesseract-OCR\tessdata;tesseract\tessdata" `
            test_detection.py

      - name: Upload main tool artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedvisionSync-exe
          path: dist/MedvisionSync.exe

      - name: Upload diagnostic artifact
        uses: actions/upload-artifact@v4
        with:
          name: Diagnose-exe
          path: dist/Diagnose.exe

      - name: Upload detection self-test artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestDetection-exe
          path: dist/TestDetection.exe
